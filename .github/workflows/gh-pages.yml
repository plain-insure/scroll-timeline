name: Build and test

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  release:
    types:
      - published

  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Setup Pages
        if: ${{ !env.ACT }}
        id: pages
        uses: actions/configure-pages@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - name: Install Node.js dependencies
        run: "npm ci"
      - name: Build
        run: "npm run build"
      - name: Unit tests
        run: "npm test"
      - name: Checkout WPT
        run: "npm run test-setup"
      - name: WPT hosts
        run: "./test/wpt/wpt make-hosts-file | sudo tee -a /etc/hosts"
      - name: WPT tests
        run: "npm run test:wpt"
      - name: Expected results
        id: expected_results
        run: |
          if [[ ! -s test/report/data.json ]]; then
            echo "WPT did not produce test/report/data.json, so the expected-results diff was skipped." >> "$GITHUB_STEP_SUMMARY"
            echo "has_summary=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! python3 -m json.tool test/report/data.json >/dev/null 2>&1; then
            echo "WPT produced an incomplete test/report/data.json, so the expected-results diff was skipped." >> "$GITHUB_STEP_SUMMARY"
            echo "has_summary=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm run test:compare
          echo "has_summary=true" >> "$GITHUB_OUTPUT"
      - name: Test results summary
        if: steps.expected_results.outputs.has_summary == 'true'
        run: |
          echo "Passed $(grep '/css' ./test/report/summary.txt |  grep -c '^PASS' ) of $(grep '/css' ./test/report/summary.txt | grep -c '^') css tests" >> $GITHUB_STEP_SUMMARY
          echo "Passed $(grep -v '/css' ./test/report/summary.txt |  grep -c '^PASS' ) of $(grep -v '/css' ./test/report/summary.txt | grep -c '^') waapi tests" >> $GITHUB_STEP_SUMMARY
      - name: Clean build files
        run: "rm -rf node_modules test/wpt"
      - name: Prepare GitHub Pages artifact
        run: "./deploy.sh"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        if: ${{ !env.ACT }}
        with:
          path: ./build

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
